[[sections.items]]
content = "考试基本是大背诵的概念题，但是需要注意细节，PPT 建议反复看。"
author = { name = "SSC", link = "https://github.com/SSC202", date = "2024-11" }

[[sections.items]]
content = """
考试与老师上课讲的内容强相关，考试的重点在平时上课中会提到。主要考察基本概念的理解，波形图绘制一般是考相对比较容易的（比如三相不会考全桥波形只会考半桥波形）。

阶段测验考过的内容期末不再考察，复习时注意不要多复习了。
"""
author = { name = "Gaster", link = "https://github.com/WDGaster703", date = "2026-01" }

[[sections]]
title = "关于实验"

[[sections.items]]
content = """
实验老师为王丹丹，22 级实验报告要求十分高（毕设级别要求），很难拿分，建议十分认真的写。23 级放低了给分要求，实验整体给分较高。但共同点是实验报告的波形图需要额外处理，老师不允许交原始截图。

实验内容：

- 22 级为三相全桥整流电路（实物）、降压斩波电路（仿真 + 实物）、反激电路（仿真）
- 23 级为三相全桥整流电路（实物）、变压器漏感影响（实物 + 仿真）、降压斩波电路（实物）、反激电路（仿真）

每届实验内容会有所改变，但主要内容不变，实验设备与电机学所用设备一致，注意接线正确，数据记录全面即可。
"""
author = { name = "Gaster", link = "https://github.com/WDGaster703", date = "2026-01" }
